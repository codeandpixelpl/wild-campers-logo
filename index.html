<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WILD CAMPERS — Wolność. Przygoda. Niezależność.</title>
<meta name="description" content="WILD CAMPERS — wynajem kamperów. Wolność. Przygoda. Niezależność. Go wild. Sleep anywhere." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://use.typekit.net/ane1jru.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&display=swap" />
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <main id="top">

    <!-- 01 · HERO (VIDEO) -->
    <section class="hero" aria-label="WILD CAMPERS — kamper w górach">
      <video class="hero__video" autoplay muted loop playsinline
             poster="assets/img/hero-poster.webp">
        <source src="assets/video/hero.mp4" type="video/mp4" />
      </video>
      <div class="hero__scroll">
        <span>Przewiń</span>
        <i class="hero__scroll-line" aria-hidden="true"></i>
      </div>
    </section>

    <!-- 02 · LOGO — system znaku, 5 wersji na tłach -->
    <section class="marks" id="logo" aria-label="System znaku WILD CAMPERS — wersje">
      <div class="marks__row reveal">
        <figure class="mark mark--paper">
          <img src="assets/img/mark-0.svg" alt="Znak WILD CAMPERS — pełny kolor na jasnym tle" />
        </figure>
        <figure class="mark mark--carbon">
          <img src="assets/img/mark-1.svg" alt="Znak WILD CAMPERS — biały na grafitowym" />
        </figure>
        <figure class="mark mark--pine">
          <img src="assets/img/mark-2.svg" alt="Znak WILD CAMPERS — amber na zieleni" />
        </figure>
        <figure class="mark mark--pine">
          <img src="assets/img/mark-3.svg" alt="Znak WILD CAMPERS — biały na zieleni" />
        </figure>
        <figure class="mark mark--amber">
          <img src="assets/img/mark-4.svg" alt="Znak WILD CAMPERS — biały na amber" />
        </figure>
      </div>
    </section>

    <!-- 03 · MOOD — kobieta w moro + kontur znaku -->
    <section class="shot shot--overlay reveal" aria-label="Wolność w kadrze">
      <img src="assets/img/sec-woman.webp" alt="Kobieta w bluzie moro na tle gór — WILD CAMPERS" />
      <img class="shot__mark" src="assets/img/union.svg" alt="" aria-hidden="true" />
    </section>

    <!-- 04 · TYPOGRAFIA -->
    <section class="shot reveal" id="typografia" aria-label="Typografia — Poster Gothic Round Cond ATF">
      <img src="assets/img/sec-font.webp" alt="Typografia WILD CAMPERS — Poster Gothic Round Cond ATF" />
    </section>

    <!-- 05 · KAMPER NAD JEZIOREM -->
    <section class="shot reveal" aria-label="Kamper i rodzina nad jeziorem">
      <img src="assets/img/sec-lake.webp" alt="Kamper, rodzina i pies nad górskim jeziorem — WILD CAMPERS" />
    </section>

    <!-- 06 · KOLORY -->
    <section class="colors reveal" id="kolory" aria-label="Paleta kolorów">
      <div class="colors__topo" aria-hidden="true"></div>
      <div class="colors__inner">
        <span class="overline"><i class="overline__sq" aria-hidden="true"></i>WILD CAMPERS <em>/ Color palette</em></span>
        <hr class="rule" />
        <h2 class="colors__title">Color palette</h2>
        <p class="colors__caption">Four core brand colors — high-contrast and trail-ready</p>
        <div class="colors__grid">
          <figure class="swatch" data-tilt>
            <div class="swatch__chip swatch__chip--ink-dark" style="--c:#ffffff">
              <span class="swatch__no">01</span>
              <span class="swatch__label"><strong>Paper</strong><span>#FFFFFF</span></span>
            </div>
            <figcaption>Text on dark · surfaces</figcaption>
          </figure>
          <figure class="swatch" data-tilt>
            <div class="swatch__chip swatch__chip--ink-light" style="--c:#020708">
              <span class="swatch__no">02</span>
              <span class="swatch__label"><strong>Carbon</strong><span>#020708</span></span>
            </div>
            <figcaption>Primary ink · backgrounds</figcaption>
          </figure>
          <figure class="swatch" data-tilt>
            <div class="swatch__chip swatch__chip--ink-dark" style="--c:#d28923">
              <span class="swatch__no">03</span>
              <span class="swatch__label"><strong>Amber</strong><span>#D28923</span></span>
            </div>
            <figcaption>Accent · CTA · highlights</figcaption>
          </figure>
          <figure class="swatch" data-tilt>
            <div class="swatch__chip swatch__chip--ink-light" style="--c:#213627">
              <span class="swatch__no">04</span>
              <span class="swatch__label"><strong>Pine</strong><span>#213627</span></span>
            </div>
            <figcaption>Deep green · panels</figcaption>
          </figure>
        </div>
      </div>
    </section>

    <!-- 07 · LUDZIE I WODA -->
    <section class="shot reveal" aria-label="Ludzie i natura">
      <img src="assets/img/sec-water.webp" alt="Rodzina brodząca w górskim jeziorze — WILD CAMPERS" />
    </section>

    <!-- 08 · COLLATERAL -->
    <section class="shot reveal" aria-label="Materiały marki">
      <img src="assets/img/sec-collateral.webp" alt="Materiały brandingowe WILD CAMPERS — czapka, kubek, koszulka, bluza, bidon, worek" />
    </section>

    <!-- 09 · LIFESTYLE -->
    <section class="shot reveal" aria-label="Styl życia">
      <img src="assets/img/sec-man.webp" alt="Mężczyzna w plenerze — WILD CAMPERS" />
    </section>

    <!-- 10 · CLOSING — znak na ciemnym tle -->
    <section class="closing reveal" aria-label="WILD CAMPERS">
      <img class="closing__mark" src="assets/img/mark-footer.svg" alt="WILD CAMPERS" />
    </section>

  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
